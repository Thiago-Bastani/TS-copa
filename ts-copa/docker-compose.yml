services:
  app:
    build: .
    ports:
      - "8080:80"
    environment:
      APP_NAME: "TS Copa"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://localhost:8080
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
      SESSION_DRIVER: file
      CACHE_STORE: file
    volumes:
      - sqlite_data:/var/www/html/database
    restart: unless-stopped

volumes:
  sqlite_data:
